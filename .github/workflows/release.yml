name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release versions
        run: node ./scripts/verify-release-version.mjs "${GITHUB_REF_NAME}"

      - name: Run web tests
        run: pnpm test:web

  build-macos:
    needs: verify-version
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust stable
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Run Rust tests
        run: pnpm test:rust

      - name: Build macOS app bundle
        run: pnpm tauri build --bundles app

      - name: Build macOS DMG
        run: pnpm bundle:mac-dmg

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v6
        with:
          name: bizclaw-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows:
    needs: verify-version
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust stable
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --yes --no-progress
          $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wixBin)) {
            throw "WiX bin directory not found: $wixBin"
          }
          "WIX=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows MSI
        run: pnpm tauri build --bundles msi

      - name: Package Windows portable ZIP
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/release/bizclaw.exe"
          if (-not (Test-Path $exePath)) {
            throw "Portable executable not found: $exePath"
          }

          $portableDir = "src-tauri/target/release/bundle/portable"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          $zipPath = Join-Path $portableDir "BizClaw-windows-portable-${env:GITHUB_REF_NAME}.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipPath -Force

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v6
        with:
          name: bizclaw-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/portable/*.zip
          if-no-files-found: error

  publish-release:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "BizClaw ${GITHUB_REF_NAME}" \
            --notes "Automated BizClaw release for ${GITHUB_REF_NAME}."

      - name: Generate updater manifest
        run: node ./scripts/build-updater-manifest.mjs "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" release-artifacts release-artifacts/latest.json

      - name: Upload packaged assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release-artifacts -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in release-artifacts" >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" "${assets[@]}" --clobber

      - name: Verify published updater assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets > release-artifacts/release.json
          node ./scripts/verify-updater-release.mjs release-artifacts/release.json
